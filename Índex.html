<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste: Nível de Exaustão Mental</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1a2e4a;
    --gold: #b8922a;
    --white: #ffffff;
    --cream: #faf8f5;
    --gold-light: #d4a843;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Cormorant Garamond', Georgia, serif; background: var(--white); color: var(--navy); min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 20px; }
  .card { width: 480px; background: var(--white); border: 2.5px solid var(--navy); padding: 0; overflow: hidden; }
  .header { background: var(--navy); padding: 28px 32px 24px; text-align: center; }
  .header-tag { font-size: 11px; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; margin-bottom: 10px; }
  .header h1 { font-family: 'Playfair Display', serif; font-style: italic; font-size: 26px; color: var(--white); line-height: 1.25; margin-bottom: 6px; }
  .header-sub { font-size: 13px; color: rgba(255,255,255,0.65); }
  .gold-line { width: 48px; height: 2px; background: var(--gold); margin: 14px auto 0; }
  .intro { padding: 28px 32px 20px; border-bottom: 1.5px solid rgba(26,46,74,0.1); }
  .intro p { font-size: 15.5px; line-height: 1.65; opacity: 0.85; text-align: center; }
  .questions-area { padding: 24px 32px 20px; }
  .progress-bar-wrap { height: 3px; background: rgba(26,46,74,0.1); border-radius: 2px; margin-bottom: 22px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--gold); border-radius: 2px; transition: width 0.5s ease; width: 0%; }
  .q-counter { font-size: 11px; letter-spacing: 2px; color: var(--gold); text-transform: uppercase; margin-bottom: 10px; }
  .question-text { font-family: 'Playfair Display', serif; font-style: italic; font-size: 18.5px; line-height: 1.45; margin-bottom: 22px; min-height: 56px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn { background: var(--cream); border: 1.5px solid rgba(26,46,74,0.18); padding: 13px 18px; text-align: left; font-family: 'Cormorant Garamond', serif; font-size: 15px; color: var(--navy); cursor: pointer; transition: all 0.22s ease; line-height: 1.4; }
  .option-btn:hover { border-color: var(--gold); background: white; }
  .option-btn.selected { border-color: var(--gold); background: var(--navy); color: var(--white); }
  .option-letter { font-size: 11px; letter-spacing: 1.5px; color: var(--gold); margin-right: 8px; text-transform: uppercase; }
  .option-btn.selected .option-letter { color: var(--gold-light); }
  .nav-area { padding: 16px 32px 28px; display: flex; justify-content: space-between; align-items: center; }
  .btn-nav { font-family: 'Cormorant Garamond', serif; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; border: 1.5px solid var(--navy); background: transparent; color: var(--navy); padding: 10px 22px; cursor: pointer; transition: all 0.2s; }
  .btn-nav.primary { background: var(--gold); border-color: var(--gold); color: var(--white); }
  .btn-nav:disabled { opacity: 0.3; cursor: default; }
  .result-area { padding: 32px; display: none; }
  .result-label { font-size: 11px; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; margin-bottom: 6px; }
  .result-title { font-family: 'Playfair Display', serif; font-style: italic; font-size: 22px; line-height: 1.3; margin-bottom: 16px; }
  .result-bar-wrap { background: rgba(26,46,74,0.08); height: 8px; border-radius: 4px; overflow: hidden; margin-bottom: 20px; }
  .result-bar-fill { height: 100%; border-radius: 4px; transition: width 1.2s ease; }
  .result-text { font-size: 15px; line-height: 1.7; opacity: 0.85; margin-bottom: 22px; }
  .result-cta { background: var(--navy); padding: 18px 20px; border-left: 4px solid var(--gold); margin-bottom: 20px; }
  .result-cta p { font-size: 14px; color: var(--white); line-height: 1.6; opacity: 0.9; }
  .result-cta strong { color: var(--gold-light); }
  .divider-gold { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
  .divider-gold span { display: block; flex: 1; height: 1px; background: var(--gold); opacity: 0.4; }
  .restart-btn { font-family: 'Cormorant Garamond', serif; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: rgba(26,46,74,0.5); background: none; border: none; cursor: pointer; display: block; margin: 0 auto; }
  .footer { background: var(--navy); padding: 14px 32px; display: flex; justify-content: space-between; align-items: center; }
  .footer-handle { font-size: 13px; color: var(--gold); letter-spacing: 1px; }
  .footer-name { font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: 1px; text-transform: uppercase; }
  .screen { transition: opacity 0.3s; }
  .screen.hidden { display: none; }
  .emoji-icon { font-size: 20px; margin-bottom: 10px; display: block; text-align: center; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="header-tag">Teste Rápido · Saúde Mental</div>
    <h1>Sua mente está<br>pedindo socorro?</h1>
    <div class="header-sub">Descubra seu nível de exaustão mental</div>
    <div class="gold-line"></div>
  </div>
  <div id="screen-intro" class="screen">
    <div class="intro">
      <span class="emoji-icon">🧠</span>
      <p>7 perguntas honestas para entender onde você está agora. Nenhuma resposta é certa ou errada, apenas verdadeira.</p>
    </div>
    <div class="nav-area" style="justify-content:center; padding-top:24px;">
      <button class="btn-nav primary" onclick="startQuiz()">Começar o teste</button>
    </div>
  </div>
  <div id="screen-quiz" class="screen hidden">
    <div class="questions-area">
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-bar"></div></div>
      <div class="q-counter" id="q-counter">Pergunta 1 de 7</div>
      <div class="question-text" id="question-text"></div>
      <div class="options" id="options-area"></div>
    </div>
    <div class="nav-area">
      <button class="btn-nav" id="btn-prev" onclick="prevQ()" disabled>← Voltar</button>
      <button class="btn-nav primary" id="btn-next" onclick="nextQ()" disabled>Próxima →</button>
    </div>
  </div>
  <div id="screen-result" class="screen hidden">
    <div class="result-area" id="result-area"></div>
  </div>
  <div class="footer">
    <span class="footer-handle">@psi_liviamelo</span>
    <span class="footer-name">Psicologia · Saúde Mental</span>
  </div>
</div>
<script>
const questions = [
  { text: "Ao acordar, como você se sente em relação ao dia que começa?", options: [{ label: "Animado(a) e com energia", score: 0 },{ label: "Neutro(a), sem grande empolgação", score: 1 },{ label: "Já cansado(a) antes mesmo de começar", score: 2 },{ label: "Com vontade de não precisar sair da cama", score: 3 }]},
  { text: "Com que frequência você sente que está funcionando no 'piloto automático'?", options: [{ label: "Raramente ou nunca", score: 0 },{ label: "Às vezes, em dias mais cheios", score: 1 },{ label: "Na maior parte do tempo", score: 2 },{ label: "Quase sempre, me sinto desconectado(a)", score: 3 }]},
  { text: "Como está sua capacidade de concentração nas últimas semanas?", options: [{ label: "Normal, consigo focar bem", score: 0 },{ label: "Levemente reduzida", score: 1 },{ label: "Difícil manter o foco por mais de alguns minutos", score: 2 },{ label: "Quase impossível, minha mente viaja o tempo todo", score: 3 }]},
  { text: "Atividades que você antes gostava de fazer agora parecem...", options: [{ label: "Igualmente prazerosas", score: 0 },{ label: "Um pouco menos interessantes", score: 1 },{ label: "Pesadas ou sem graça", score: 2 },{ label: "Indiferentes, perdi o prazer quase por completo", score: 3 }]},
  { text: "Como você lida com pequenos imprevistos ou frustrações do dia a dia?", options: [{ label: "Com calma e naturalidade", score: 0 },{ label: "Me incomodo, mas consigo lidar", score: 1 },{ label: "Fico irritado(a) com mais facilidade que antes", score: 2 },{ label: "Pequenas coisas me desestabilizam muito", score: 3 }]},
  { text: "Ao final do dia, seu descanso realmente te recupera?", options: [{ label: "Sim, acordo renovado(a)", score: 0 },{ label: "Às vezes sim, às vezes não", score: 1 },{ label: "Raramente me sinto descansado(a)", score: 2 },{ label: "Nunca, o cansaço acumulou e não passa", score: 3 }]},
  { text: "Quando pensa no futuro próximo, o que predomina?", options: [{ label: "Expectativa e esperança", score: 0 },{ label: "Incerteza, mas com alguma esperança", score: 1 },{ label: "Preocupação constante e ansiedade", score: 2 },{ label: "Um vazio, parece difícil enxergar saída", score: 3 }]}
];
const results = [
  { range: [0,6], level: "Equilíbrio Mental", color: "#2e7d52", emoji: "🌱", title: "Você está em equilíbrio — por enquanto", text: "Seu nível de exaustão ainda é baixo. Isso é ótimo! Mas lembre-se: o esgotamento raramente aparece de uma vez. Ele se acumula em silêncio. Manter hábitos de autocuidado agora é a sua melhor prevenção.", cta: "Mesmo estando bem, aprender a reconhecer os sinais precoces do burnout pode te proteger. Que tal explorar mais sobre isso aqui no perfil?" },
  { range: [7,11], level: "Alerta Moderado", color: "#b8922a", emoji: "⚠️", title: "Sinais de alerta — sua mente está pedindo atenção", text: "Você está funcionando, mas com mais esforço do que deveria. Esse peso que sente é real. O cansaço moderado, quando ignorado, evolui para esgotamento completo. Agora é o momento de agir.", cta: "Esse padrão tem solução — e cuidar disso agora é muito mais fácil do que depois. Vamos conversar sobre o que está pesando para você?" },
  { range: [12,16], level: "Exaustão Significativa", color: "#c0392b", emoji: "🔴", title: "Sua mente está esgotada — isso precisa de cuidado", text: "O que você está sentindo tem nome: exaustão mental. Não é fraqueza, não é frescura. É seu sistema nervoso sobrecarregado. Continuar tentando 'empurrar' sem suporte pode te custar muito mais depois.", cta: "Você não precisa carregar isso sozinho(a). Dar o primeiro passo em direção a um suporte profissional pode mudar muito a forma como você se sente. Estou aqui." },
  { range: [17,21], level: "Burnout Severo", color: "#7b1a1a", emoji: "🆘", title: "Seus recursos estão no limite — é hora de agir", text: "O que você está descrevendo são sintomas sérios de esgotamento. Esse nível de exaustão afeta seu corpo, sua mente e suas relações. Você não chegou aqui da noite pro dia — e não vai sair sozinho(a).", cta: "Buscar ajuda profissional agora não é um sinal de fraqueza. É o ato mais corajoso que você pode fazer por você. Me manda uma mensagem, vamos conversar." }
];
let current = 0;
let answers = new Array(questions.length).fill(null);
function startQuiz() { document.getElementById('screen-intro').classList.add('hidden'); document.getElementById('screen-quiz').classList.remove('hidden'); renderQuestion(); }
function renderQuestion() {
  const q = questions[current];
  document.getElementById('q-counter').textContent = `Pergunta ${current + 1} de ${questions.length}`;
  document.getElementById('question-text').textContent = q.text;
  const opts = document.getElementById('options-area');
  opts.innerHTML = '';
  const letters = ['A','B','C','D'];
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn' + (answers[current] === i ? ' selected' : '');
    btn.innerHTML = `<span class="option-letter">${letters[i]}.</span>${opt.label}`;
    btn.onclick = () => selectOption(i);
    opts.appendChild(btn);
  });
  document.getElementById('progress-bar').style.width = `${(current / questions.length) * 100}%`;
  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').disabled = answers[current] === null;
  document.getElementById('btn-next').textContent = current === questions.length - 1 ? 'Ver resultado →' : 'Próxima →';
}
function selectOption(i) { answers[current] = i; document.querySelectorAll('.option-btn').forEach((btn, idx) => { btn.classList.toggle('selected', idx === i); }); document.getElementById('btn-next').disabled = false; }
function nextQ() { if (answers[current] === null) return; if (current < questions.length - 1) { current++; renderQuestion(); } else { showResult(); } }
function prevQ() { if (current > 0) { current--; renderQuestion(); } }
function showResult() {
  const total = answers.reduce((sum, a, i) => sum + (a !== null ? questions[i].options[a].score : 0), 0);
  const result = results.find(r => total >= r.range[0] && total <= r.range[1]) || results[results.length - 1];
  const pct = Math.round((total / 21) * 100);
  document.getElementById('screen-quiz').classList.add('hidden');
  document.getElementById('screen-result').classList.remove('hidden');
  const area = document.getElementById('result-area');
  area.style.display = 'block';
  area.innerHTML = `<div class="result-label">Seu resultado</div><div class="result-title">${result.emoji} ${result.title}</div><div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;"><span style="font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);">Nível de exaustão</span><span style="font-size:13px;color:${result.color};font-weight:600;">${result.level}</span></div><div class="result-bar-wrap"><div class="result-bar-fill" id="res-bar" style="width:0%;background:${result.color};"></div></div><p class="result-text">${result.text}</p><div class="result-cta"><p><strong>O que você pode fazer agora:</strong><br>${result.cta}</p></div><div class="divider-gold"><span></span><i>♦</i><span></span></div><p style="font-size:13px;text-align:center;color:rgba(26,46,74,0.55);margin-bottom:18px;">Salve e compartilhe com alguém que também precisa ver isso</p><button class="restart-btn" onclick="restartQuiz()">↺ Refazer o teste</button>`;
  setTimeout(() => { document.getElementById('res-bar').style.width = pct + '%'; }, 200);
}
function restartQuiz() { current = 0; answers = new Array(questions.length).fill(null); document.getElementById('screen-result').classList.add('hidden'); document.getElementById('screen-quiz').classList.remove('hidden'); renderQuestion(); }
</script>
</body>
</html>
